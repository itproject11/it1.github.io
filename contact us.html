<!DOCTYPE html>
<html>
<head>
    <title>Luxury Cars Agency </title>
    <meta charset="UTF-8" />
    <meta name="description" content="here you can buy comfort" />
    <link rel="stylesheet" href="style.css">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <style>
    body {
            /* استخدمنا المتغيرات عشان تتغير تلقائياً */
            background-image: var(--bg-image, url('photos/photo_2026-04-23_11-04-12.jpg'));
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            transition: all 0.5s ease;
        }

        main {
            text-align: center;
            padding: 50px 20px;
        }

        form {
            background: var(--overlay-color, rgba(0, 0, 0, 0.85));
            backdrop-filter: blur(10px); 
            border: 1px solid var(--accent-color);
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 15px;
            transition: 0.5s;
        }
        label {
            color: var(--accent-color);
            font-size: 12px;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-align: left; 
            padding-left: 5%;
        }

        input, textarea {
            background: var(--input-bg, rgba(255, 255, 255, 0.05));
            border: 1px solid var(--border-color, #444);
            color: var(--main-text, #fff);
            padding: 12px;
            width: 90%;
            border-radius: 5px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-luxury {
            background: var(--accent-color);
            color: #000; 
            font-weight: bold;
            cursor: pointer;
            width: 90%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-luxury:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            letter-spacing: 3px;
            transform: translateY(-3px);
        }

        /* زر تبديل الثيم */
        #theme-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
     </style>
</head>
<body>
    <header> 
        <h1> CONTACT US </h1>
        <button id="theme-btn">🌙 Switch Theme</button>
        <nav> 
            <ul>
                <li><a href="index.html" >HOME</a></li>
                <li><a href="mercedes.html" > MERCEDES </a></li>
                <li><a href="BMW.html" > BMW </a></li>
                <li><a href="porshe.html" > PORSCHE </a> </li>
                <li><a href="cadillac.html" > CADILLAC </a> </li>
                <li><a href="Rolls royce.html"> ROLLS ROYCE </a> </li>
                <li><a href="Bugatti.html" > BUGATTI </a></li>
                <li><a href="contact us.html" > CONTACT US </a></li>
            </ul>
        </nav>
    </header>
<main>
    <form>
        <label> name : </label><br>
            <input type="text" name="fullname" required><br><br>
        <label> email : </label><br>
            <input type="email" name="email" required><br><br>
        <label> message : </label> <br>
            <textarea rows="4" cols="20" placeholder="please enter your message" required></textarea><br><br>
            <input type="submit" value="send message" class="btn-luxury"><br><br>
    </form>
</main>
    <footer class="foot1">
        <p><p>&copy; 2026 Luxury Cars Agency. All Rights Reserved. </p>
    </footer>
<script>
    const btn = document.getElementById('theme-btn');
    const body = document.body;

    // 1. أول ما الصفحة تحمل: شوف هل المستخدم اختار "light" قبل كدة؟
    const savedTheme = localStorage.getItem('theme');
    
    if (savedTheme === 'light') {
        body.setAttribute('data-theme', 'light');
        btn.innerText = "☀️ Light Mode";
    }

    // 2. عند الضغط على الزرار: بدل الثيم واحفظ الاختيار
    btn.addEventListener('click', () => {
        const currentTheme = body.getAttribute('data-theme');
        
        if (currentTheme === 'light') {
            // حول للوضع المظلم
            body.removeAttribute('data-theme');
            btn.innerText = "🌙 Dark Mode";
            localStorage.setItem('theme', 'dark'); // احفظ "dark"
        } else {
            // حول للوضع الفاتح
            body.setAttribute('data-theme', 'light');
            btn.innerText = "☀️ Light Mode";
            localStorage.setItem('theme', 'light'); // احفظ "light"
        }
    });
</script>
</body>
</html>
