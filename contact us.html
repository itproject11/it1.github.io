<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Luxury Cars Agency - Contact Us">
    <title>Contact Us | Luxury Cars Agency</title>
    <link rel="stylesheet" href="style.css">

    <style>
    body {
            background-image: var(--bg-image, url('photos/photo_2026-04-23_11-04-12.jpg'));
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            transition: all 0.5s ease;
            
        }

        main {
            text-align: center;
            padding: 50px 20px;
        }

        form {
            background: var(--overlay-color, rgba(0, 0, 0, 0.85));
            backdrop-filter: blur(10px); 
            border: 1px solid var(--accent-color);
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 15px;
            transition: 0.5s;
        }
        label {
            color: var(--accent-color);
            font-size: 12px;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-align: left; 
            padding-left: 5%;
        }
        input, textarea {
            background: var(--input-bg);
            color: var(--text-primary);
            border: 1px solid var(--accent-color);
            padding: 12px;
            width: 90%;
            border-radius: 5px;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-luxury {
            background: var(--accent-color);
            color: #000; 
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            width: 90%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-luxury:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: translateY(-3px);
        }
    </style>


</head>
<body>

    <!-- ===== HEADER ===== -->
    <header id="main-header">
        <h1 id="site-logo">CONTACT US</h1>

        <nav id="main-nav">
            <ul>
                <li><a href="index.html" >HOME</a></li>
                <li><a href="mercedes.html" > MERCEDES </a></li>
                <li><a href="BMW.html" > BMW </a></li>
                <li><a href="porshe.html" > PORSCHE </a> </li>
                <li><a href="cadillac.html" > CADILLAC </a> </li>
                <li><a href="Rolls royce.html"> ROLLS ROYCE </a> </li>
                <li><a href="Bugatti.html" > BUGATTI </a></li>
                <li><a href="contact us.html" > CONTACT US </a></li>
            </ul>
        </nav>

        <!-- Theme Toggle - Top Right -->
        <button id="theme-btn">🌙 Dark Mode</button>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="contact-main">

        <div id="contact-form-wrapper">

            <form id="contact-form">

                <label class="form-label" for="contact-name">Name</label>
                <input class="form-input" type="text" id="contact-name" name="fullname" required>

                <label class="form-label" for="contact-email">Email</label>
                <input class="form-input" type="email" id="contact-email" name="email" required>

                <label class="form-label" for="contact-message">Message</label>
                <textarea class="form-textarea" id="contact-message" name="message" rows="5" placeholder="Please enter your message" required></textarea>

                <button type="submit" class="btn-luxury">SEND MESSAGE</button>

            </form>

        </div>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer id="main-footer" class="cfooter">
        <p>&copy; 2026 Luxury Cars Agency. All Rights Reserved.</p>
    </footer>

  <script src="script.js"></script>
</body>
</html>
